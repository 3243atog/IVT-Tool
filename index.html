<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>急性缺血性腦中風 IVT 交叉比對工具</title>
    <style>
        :root {
            --primary: #2c3e50;
            --insert-blue: #0056b3;
            --nhi-purple: #6f42c1;
            --guide-teal: #087f6d;
            --ci-red: #d90429;
            --rc-yellow: #ffc300;
            --consider-green: #2ecc71;
            --notebook-blue: #4285f4; 
            --bg-gray: #f2f4f7;
        }
        body { font-family: -apple-system, "Noto Sans TC", "Microsoft JhengHei", sans-serif; margin: 0; background: var(--bg-gray); color: #333; display: flex; flex-direction: column; min-height: 100vh; }

        /* 置頂標題列 */
        header {
            background: var(--primary); color: white; padding: 10px;
            position: sticky; top: 0; z-index: 1000; display: flex; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .menu-toggle { background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 10px; margin-right: 10px; }
        .header-title { font-size: 0.9em; font-weight: bold; line-height: 1.3; }

        /* 側邊選單 */
        .sidebar {
            width: 280px; background: var(--primary); color: white;
            position: fixed; top: 0; left: -280px; height: 100%; transition: 0.3s;
            overflow-y: auto; z-index: 2000; box-shadow: 2px 0 10px rgba(0,0,0,0.3);
        }
        .sidebar.active { left: 0; }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1500; }
        .sidebar-overlay.active { display: block; }
        .sidebar-header { padding: 20px; background: #1a252f; text-align: center; border-bottom: 1px solid #34495e; }
        .ai-link-container { padding: 10px; }
        .ai-btn { display: block; width: 100%; background: var(--notebook-blue); color: white; text-decoration: none; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 0.9em; text-align: center; border: 1px solid #5da5ff; box-sizing: border-box; }
        .search-container { padding: 10px; position: sticky; top: 0; background: var(--primary); }
        .search-input { width: 100%; padding: 12px 15px; border-radius: 25px; border: none; box-sizing: border-box; font-size: 16px; }

        /* 選單按鈕 */
        .nav-group { padding-bottom: 10px; }
        .nav-title { padding: 15px 20px 5px; font-size: 0.8em; color: #95a5a6; font-weight: bold; }
        .nav-btn { width: 100%; border: none; background: none; color: #bdc3c7; padding: 15px 25px; text-align: left; cursor: pointer; font-size: 1em; border-bottom: 1px solid #34495e; }
        .nav-btn.active { background: #3e5871; border-left: 5px solid #3498db; }
        .nav-btn.hidden { display: none; }

        /* 右側主內容 */
        .main-content { padding: 15px; max-width: 800px; margin: 0 auto; flex: 1; width: 100%; box-sizing: border-box; }
        .scenario-header h1 { font-size: 1.4em; color: var(--primary); margin: 10px 0; line-height: 1.4; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        
        /* 規範卡片 */
        .category-container { display: flex; flex-direction: column; gap: 20px; }
        .cat-box { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border: 1px solid #e0e0e0; overflow: hidden; }
        .cat-header { padding: 12px 15px; color: white; font-weight: bold; font-size: 1em; }
        .header-insert { background: var(--insert-blue); }
        .header-nhi { background: var(--nhi-purple); }
        .header-guide { background: var(--guide-teal); }
        
        .cat-body { padding: 15px; }
        .desc-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; padding-bottom: 12px; border-bottom: 1px solid #f0f0f0; gap: 10px; }
        .desc-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .text-content { flex: 1; font-size: 1.05em; line-height: 1.6; color: #2c3e50; }

        /* 標籤樣式 */
        .status-tag { font-size: 0.8em; padding: 4px 8px; border-radius: 4px; font-weight: bold; white-space: nowrap; margin-top: 2px; }
        .tag-ci { background: var(--ci-red); color: white; }
        .tag-rc { background: var(--rc-yellow); color: black; border: 1px solid #d4a017; }
        .tag-consider { background: var(--consider-green); color: white; }

        .text-link { display: inline-block; margin-top: 8px; padding: 4px 10px; background: #f8f9fa; color: #0056b3; text-decoration: none; border-radius: 4px; border: 1px solid #0056b3; font-weight: bold; font-size: 0.85em; }

        /* 頁尾資訊 */
        footer { background: #eee; padding: 25px 15px; font-size: 0.85em; color: #666; text-align: center; border-top: 1px solid #ddd; margin-top: 40px; }
        .footer-author { font-weight: bold; color: var(--primary); margin-bottom: 5px; }
        .disclaimer { max-width: 600px; margin: 10px auto 0; font-size: 0.9em; line-height: 1.5; }

        .welcome-msg { text-align: center; margin-top: 50px; color: #7f8c8d; padding: 20px; }
    </style>
</head>
<body>

<header>
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>
    <div class="header-title">
        急性缺血性腦中風靜脈血栓溶解治療<br>
        適應症與禁忌症交叉比對工具
    </div>
</header>

<div class="sidebar-overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">選單</div>
    <div class="ai-link-container">
        <a href="https://notebooklm.google.com/notebook/50ee7a5c-1b76-48c6-84bf-ec366c55f420" target="_blank" class="ai-btn">NotebookLM AI 輔助</a>
    </div>
    <div class="search-container">
        <input type="text" id="scenarioSearch" class="search-input" placeholder="🔍 快速查找臨床情境..." onkeyup="filterScenarios()">
    </div>
    <div class="nav-scroll" id="navArea">
        <div class="nav-group">
            <div class="nav-title">1. 時間窗與年齡</div>
            <button class="nav-btn" onclick="updateView('time')">超過 4.5h / 不明時間</button>
            <button class="nav-btn" onclick="updateView('minor')">輕微中風 / 症狀改善</button>
            <button class="nav-btn" onclick="updateView('age')">高齡 / 青少年</button>
        </div>
        <div class="nav-group">
            <div class="nav-title">2. 生理指標與檢驗</div>
            <button class="nav-btn" onclick="updateView('bp')">血壓過高 (>185/110)</button>
            <button class="nav-btn" onclick="updateView('glucose')">血糖異常 (<50 或 >400)</button>
            <button class="nav-btn" onclick="updateView('platelets')">血小板低下 (<100,000)</button>
            <button class="nav-btn" onclick="updateView('coag')">凝血指標異常 (INR/aPTT)</button>
        </div>
        <div class="nav-group">
            <div class="nav-title">3. 手術、創傷與懷孕</div>
            <button class="nav-btn" onclick="updateView('surgery_major')">重大手術 / 嚴重創傷</button>
            <button class="nav-btn" onclick="updateView('surgery_cns')">顱內脊柱手術 / TBI</button>
            <button class="nav-btn" onclick="updateView('birth')">分娩 / 懷孕 / 產後</button>
            <button class="nav-btn" onclick="updateView('puncture')">血管穿刺 / 腰椎穿刺</button>
        </div>
        <div class="nav-group">
            <div class="nav-title">4. 病史與特殊併發症</div>
            <button class="nav-btn" onclick="updateView('prior_stroke')">缺血性中風病史</button>
            <button class="nav-btn" onclick="updateView('prior_ich')">顱內出血史 (Hx of ICH)</button>
            <button class="nav-btn" onclick="updateView('prior_mi')">心肌梗塞 (Hx of MI/STEMI)</button>
            <button class="nav-btn" onclick="updateView('gi_bleed')">消化道 / 泌尿道出血</button>
            <button class="nav-btn" onclick="updateView('seizure')">中風發作時併發癲癇</button>
        </div>
        <div class="nav-group">
            <div class="nav-title">5. 腫瘤、血管與器官</div>
            <button class="nav-btn" onclick="updateView('tumor')">顱內腫瘤 / 活躍癌症</button>
            <button class="nav-btn" onclick="updateView('aneurysm')">動脈瘤 / 動靜脈畸形</button>
            <button class="nav-btn" onclick="updateView('dissection')">動脈剝離 (Dissection)</button>
            <button class="nav-btn" onclick="updateView('brain_special')">Moyamoya / CAA / ARIA</button>
            <button class="nav-btn" onclick="updateView('organs')">肝病 / 胰臟炎 / 洗腎</button>
        </div>
        <div class="nav-group">
            <div class="nav-title">6. 藥物使用</div>
            <button class="nav-btn" onclick="updateView('anticoagulants')">Warfarin / DOAC 使用</button>
            <button class="nav-btn" onclick="updateView('heparin')">Heparin / LMWH (最近)</button>
            <button class="nav-btn" onclick="updateView('antiplatelet')">抗血小板 (ASA/DAPT)</button>
        </div>
    </div>
</div>

<div class="main-content" id="mainDisplay">
    <div class="welcome-msg">
        <h2>← 請開啟選單查找臨床情境</h2>
        <p>系統將即時比對仿單、健保與 TSS/AHA 指引規範。</p>
    </div>
</div>

<footer>
    <div class="footer-author">作者：吳柏陞 Brian Po-Sheng Wu</div>
    <div>最後更新日期：June 8, 2026</div>
    <div class="disclaimer">
        <b>免責聲明：</b>本工具僅供醫療專業人員參考，臨床決策應結合病患實際狀況與最新官方文件。
    </div>
</footer>

<script>
const DRIVE_LINKS = {
    insert: "https://drive.google.com/file/d/1TeWwtfSL2e_HqU9V1jBLtAD7FuLjF4Fb/view?usp=drive_link",
    nhi: "https://drive.google.com/file/d/1STqXlv3YUUd7BNtCl9dyRNz_qKMrXWlF/view?usp=drive_link",
    tw_guide: "https://drive.google.com/file/d/1f4Xejpy8va2I2QLJ-teTTx45AraNSzw5/view?usp=sharing",
    us_guide: "https://drive.google.com/file/d/14yffsfYWp8y2_45a7IjeGQZ3saAn5tnO/view?usp=drive_link"
};

const scenarios = {
    time: {
        name: "發病時間 > 4.5 小時 / 不明時間",
        insert: [{ s: "CI", t: "輸注本藥前，缺血性發作的時間已超過4.5小時或症狀發作時間不明。", l: DRIVE_LINKS.insert }],
        nhi: [{ s: "CI", t: "輸注本藥前，缺血性發作的時間已超過 4.5 小時或症狀發作時間不明。", l: DRIVE_LINKS.nhi }],
        guide: [
            { src: "TSS 2025", s: "RC", l: DRIVE_LINKS.tw_guide, t: "發病或最後正常時間4.5–9小時並符合腦部影像學篩選條件（符合EXTEND試驗條件：核心體積 <70 mL，半影區比率 >1.2，且體積差異超過 10 mL）。" },
            { src: "TSS 2025", s: "RC", l: DRIVE_LINKS.tw_guide, t: "睡醒發現中風符合 WAKE-UP 試驗 MRI 篩選條件。" },
            { src: "AHA/ASA 2026", s: "RC", l: DRIVE_LINKS.us_guide, t: "發病時間不明或發病 > 4.5 小時為相對禁忌。應透過影像篩選個別評估。" }
        ]
    },
    minor: {
        name: "輕微中風 / 症狀迅速改善",
        insert: [{ s: "CI", t: "輸注本藥前，急性缺血性中風的症狀已迅速改善或症狀輕微。", l: DRIVE_LINKS.insert }],
        nhi: [{ s: "CI", t: "輸注本藥前，急性缺血性腦中風的症狀已迅速改善或症狀輕微。（例如 NIHSS < 4分）", l: DRIVE_LINKS.nhi }],
        guide: [
            { src: "TSS 2025", s: "RC", l: DRIVE_LINKS.tw_guide, t: "輕微（NIHSS ≦ 5）且合併失能症狀。" },
            { src: "AHA/ASA 2026", s: "Consider", l: DRIVE_LINKS.us_guide, t: "Uncertainty of stroke diagnosis / stroke mimics，益處通常大於風險。" }
        ]
    },
    age: {
        name: "高齡 / 青少年",
        insert: [
            { s: "CI", t: "絕對禁忌：兒童及未滿十八歲之青少年。", l: DRIVE_LINKS.insert },
            { s: "RC", t: "相對禁忌：80歲以上之病人，顱內出血風險可能升高，治療淨效益也可能較低。", l: DRIVE_LINKS.insert }
        ],
        nhi: [{ s: "CI", t: "收案條件：年齡在 18 歲以上。", l: DRIVE_LINKS.nhi }],
        guide: [
            { src: "TSS 2025", s: "RC", l: DRIVE_LINKS.tw_guide, t: "過去功能狀態 mRS ≧ 2 分視為相對禁忌。" },
            { src: "AHA/ASA 2026", s: "Consider", l: DRIVE_LINKS.us_guide, t: "高齡不再是絕對禁忌，應根據個體化評估權衡。" }
        ]
    },
    bp: {
        name: "血壓過高 (>185/110)",
        insert: [{ s: "CI", t: "嚴重且未被控制的動脈高血壓。經處置後持續維持收縮壓 > 185 mmHg 或舒張壓 > 110 mmHg。", l: DRIVE_LINKS.insert }],
        nhi: [{ s: "CI", t: "嚴重且未被控制的高血壓。收縮壓 > 185 或舒張壓 > 110，或需要積極靜脈給藥降壓至界限以下。", l: DRIVE_LINKS.nhi }],
        guide: [
            { src: "TSS 2025", s: "CI", l: DRIVE_LINKS.tw_guide, t: "衰竭或經矯正後血壓持續維持 > 185/110 mmHg。" },
            { src: "AHA/ASA 2026", s: "CI", l: DRIVE_LINKS.us_guide, t: "Blood pressure > 185/110 mmHg 且無法藉由處置降至此標準以下者為絕對禁忌。" }
        ]
    },
    glucose: {
        name: "血糖異常 (<50 或 >400)",
        insert: [{ s: "CI", t: "經處置後持續維持血糖 < 50 mg/dL 或血糖 > 400 mg/dL。", l: DRIVE_LINKS.insert }],
        nhi: [{ s: "CI", t: "血糖 < 50mg/dL 或 > 400mg/dL。", l: DRIVE_LINKS.nhi }],
        guide: [
            { src: "TSS 2025", s: "CI", l: DRIVE_LINKS.tw_guide, t: "經矯正後血糖持續維持 < 50 mg/dL 或 > 400 mg/dL。" },
            { src: "TSS 2025", s: "RC", l: DRIVE_LINKS.tw_guide, t: "血糖異常時，高度懷疑為 AIS 而非 mimics 者，可校正後評估施打。" }
        ]
    },
    platelets: {
        name: "血小板低下",
        insert: [{ s: "CI", t: "血小板少於 100,000/mm3。", l: DRIVE_LINKS.insert }],
        nhi: [{ s: "CI", t: "血小板 < 100,000/mm3。", l: DRIVE_LINKS.nhi }],
        guide: [{ src: "TSS 2025", s: "CI", l: DRIVE_LINKS.tw_guide, t: "血小板數 < 100,000/mm3。" }, { src: "AHA/ASA 2026", s: "CI", l: DRIVE_LINKS.us_guide, t: "Severe coagulopathy or thrombocytopenia (<100,000/mm3)。" }]

    coag: {
        name: "凝血指標異常",

        guide: [{ src: "TSS 2025", s: "CI", l: DRIVE_LINKS.tw_guide, t: "服用 Warfarin 且 INR ＞ 1.7；aPTT > 40 sec。" }, { src: "AHA/ASA 2026", s: "CI", l: DRIVE_LINKS.us_guide, t: "Severe coagulopathy (INR > 1.7, PT > 15s)。" }]

    surgery_major: {
        name: "重大手術 / 嚴重創傷",
        insert: [{ s: "CI", t: "過去10天內曾動過大手術或有嚴重創傷、最近頭部或顱部曾發生創傷。", l: DRIVE_LINKS.insert }],
        nhi: [{ s: "CI", t: "過去 10 天內大手術或嚴重創傷。過久的或創傷性的心肺復甦術（超過 2 分鐘）。", l: DRIVE_LINKS.nhi }],
        guide: [{ src: "TSS 2025", s: "CI", l: DRIVE_LINKS.tw_guide, t: "近 14 日內曾接受重大手術。" }, { src: "AHA/ASA 2026", s: "RC", l: DRIVE_LINKS.us_guide, t: "Recent major non-CNS trauma (14d-3m)；Recent major non-CNS surgery (10d)。" }]
    },
    surgery_cns: {
        name: "顱內、脊柱手術 / TBI",
        insert: [
            { s: "CI", t: "中樞神經系統損害之病史（腫瘤、血管瘤、顱內或脊柱的手術）。", l: DRIVE_LINKS.insert },
            { s: "CI", t: "最近三個月內嚴重頭部創傷。", l: DRIVE_LINKS.insert }
        ],
        nhi: [
            { s: "CI", t: "最近 3 個月內有嚴重性頭部創傷。", l: DRIVE_LINKS.nhi },
            { s: "CI", t: "中樞神經系統損害之病史（腫瘤、血管瘤、顱內或脊柱手術）。", l: DRIVE_LINKS.nhi }
        ],
        guide: [
            { src: "TSS 2025", s: "CI", l: DRIVE_LINKS.tw_guide, t: "三個月內顱內或脊柱手術、嚴重性頭部創傷（三個月以上非絕對禁忌）。" },

    birth: {
        name: "分娩 / 懷孕 / 產後",
        insert: [{ s: "CI", t: "過去 10 天內分娩。", l: DRIVE_LINKS.insert }],
        nhi: [{ s: "CI", t: "排除條件包含分娩（必須均為否）。", l: DRIVE_LINKS.nhi }],

    prior_ich: {

function toggleMenu() {
    document.getElementById('sidebar').classList.toggle('active');
    document.getElementById('overlay').classList.toggle('active');
}

function updateView(id) {
    const s = scenarios[id];
    if (!s) return;
    const display = document.getElementById('mainDisplay');
    
    const generateRows = (items) => {
        if (!items || items.length === 0) return `<div class="desc-row"><div class="text-content">未具體列入規範項目。</div></div>`;
        return items.map(item => `
            <div class="desc-row">
                <div class="text-content">
                    ${item.src ? `<b>[${item.src}]</b> ` : ''}
                    ${item.t}
                    ${item.l ? `<br><a href="${item.l}" target="_blank" class="text-link">PDF 連結 🔗</a>` : ''}
                </div>
                <span class="status-tag ${getTagClass(item.s)}">${getTagText(item.s)}</span>
            </div>
        `).join('');
    };

    let html = `
        <div class="scenario-header"><h1>${s.name}</h1></div>
        <div class="category-container">
            <div class="cat-box">
                <div class="cat-header header-insert">(1) 藥品仿單 (Actilyse 2025)</div>
                <div class="cat-body">${generateRows(s.insert)}</div>
            </div>

            <div class="cat-box">
                <div class="cat-header header-nhi">(2) 健保給付規定 (NHI 2023)</div>
                <div class="cat-body">${generateRows(s.nhi)}</div>
            </div>

            <div class="cat-box">
                <div class="cat-header header-guide">(3) 醫療學術指引 (Guidelines)</div>
                <div class="cat-body">${generateRows(s.guide)}</div>
            </div>
        </div>
    `;
    
    display.innerHTML = html;
    if (window.innerWidth < 768) toggleMenu();
    window.scrollTo(0, 0);
}

function filterScenarios() {
    const filter = document.getElementById('scenarioSearch').value.toUpperCase();
    const btns = document.querySelectorAll('.nav-btn');
    btns.forEach(btn => {
        btn.classList.toggle('hidden', btn.innerText.toUpperCase().indexOf(filter) === -1);
    });
}

function getTagClass(status) {
    return status === 'CI' ? 'tag-ci' : status === 'RC' ? 'tag-rc' : status === 'Consider' ? 'tag-consider' : 'tag-none';
}

function getTagText(status) {
    return status === 'CI' ? '絕對禁忌' : status === 'RC' ? '相對禁忌' : status === 'Consider' ? '建議考慮' : '未條列';
}
