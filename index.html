function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }

function updateView(id) {
    const s = scenarios[id];
    if (!s) return;
    const display = document.getElementById('mainDisplay');
    const generateRows = (items) => {
        if (!items || items.length === 0) return `<div class="desc-row"><div class="text-content">未具體列入此項規範。</div></div>`;
        return items.map(item => `
            <div class="desc-row">
                <div class="text-content">
                    ${item.src ? `<b>[${item.src}]</b> ` : ''}${item.t}
                    ${item.n ? `<span class="supplement-note">${item.n}</span>` : ''}
                    <br><a href="${item.l}" target="_blank" class="text-link">PDF 連結 🔗</a>
                </div>
                <span class="status-tag ${getTagClass(item.s)}">${getTagText(item.s)}</span>
            </div>
        `).join('');
    };

    let html = `
        <div class="scenario-header"><h1>${s.name.split(' <small>')[0]}</h1></div>
        <div class="category-container">
            <div class="cat-box"><div class="cat-header header-insert">(1) 藥品仿單 (Actilyse 2025)</div><div class="cat-body">${generateRows(s.insert)}</div></div>
            <div class="cat-box"><div class="cat-header header-nhi">(2) 健保給付規定 (NHI 2023)</div><div class="cat-body">${generateRows(s.nhi)}</div></div>
            <div class="cat-box"><div class="cat-header header-guide">(3) 醫療學術指引 (Guidelines)</div><div class="cat-body">${generateRows(s.guide)}</div></div>
        </div>
    `;
    display.innerHTML = html;
    if (window.innerWidth < 768) toggleMenu();
    window.scrollTo(0, 0);
}

function filterScenarios() {
    const filter = document.getElementById('scenarioSearch').value.toUpperCase();
    const btns = document.querySelectorAll('.nav-btn');
    btns.forEach(btn => {
        const text = btn.innerText.toUpperCase();
        btn.classList.toggle('hidden', text.indexOf(filter) === -1);
    });
}

function getTagClass(s) { return s === 'CI' ? 'tag-ci' : s === 'RC' ? 'tag-rc' : s === 'Consider' ? 'tag-consider' : 'tag-none'; }
function getTagText(s) { return s === 'CI' ? '絕對禁忌' : s === 'RC' ? '相對禁忌' : s === 'Consider' ? '建議考慮' : '未條列'; }
