<script>

const scenarios = {
    time: { name: "發病時間 > 4.5 小時 / 不明時間", insert: [{s:"CI", t:"輸注本藥前，缺血性發作的時間已超過4.5小時或症狀發作時間不明。"}], nhi: [{s:"CI", t:"輸注本藥前，缺血性發作的時間已超過 4.5 小時或症狀發作時間不明。"}], guide: [{src:"TSS 2025", s:"RC", t:"睡醒時發現中風或發病時間不明的急性缺血性腦中風並符合腦部影像學篩選條件(符合WAKE-UP試驗條件：MRI上出現DWI-FLAIR mismatch)。"}, {src:"TSS 2025", s:"Consider", t:"發病或最後正常時間4.5–9小時並符合腦部影像學篩選條件（符合EXTEND試驗條件：灌流影像顯示ischemic core體積小於70 mL，penumbra與ischemic core體積比率大於1.2，且兩者之間的絕對體積差異超過10 mL）。"}, {src:"AHA/ASA 2026", s:"Consider", t:"In patients with AIS who (a) have unknown time of onset and are within 4.5 hours from symptom recognition and (b) have an MRI-DWI lesion smaller than one-third of the MCA territory and no marked signal change on FLAIR, IVT administered within 4.5 hours of stroke symptom recognition can be beneficial to improve functional outcomes."}, {src:"AHA/ASA 2026", s:"Consider", t:"In patients with AIS who have salvageable ischemic penumbra detected on automated perfusion imaging and who (a) awake with stroke symptoms within 9 hours from the midpoint of sleep or (b) are 4.5–9 hours from last known well, IV thrombolysis may be reasonable to improve functional outcomes."}, {src:"AHA/ASA 2026", s:"RC", t:"In patients with AIS due to LVO with salvageable ischemic penumbra, presenting within 4.5 to 24 hours from symptom onset or last known well, and who cannot receive EVT, treatment with IVT directed by individuals with expertise in thrombolytic stroke care may be beneficial to improve functional outcomes."}] },
    minor: { name: "輕微中風 / 症狀改善", insert: [{s:"CI", t:"輸注本藥前，急性缺血性中風的症狀已迅速改善或症狀輕微。"}], nhi: [{s:"CI", t:"輸注本藥前，急性缺血性腦中風的症狀已迅速改善或症狀輕微。（例如NIHSS<4分）。"}], guide: [{src:"TSS 2025", s:"RC", t:"輕微（NIHSS≦5）且合併失能症狀。"}, {src:"AHA/ASA 2026", s:"Consider", t:"Uncertainty of stroke diagnosis / stroke mimics."}] },
    severe_stroke: { name: "臨床 / 影像嚴重中風", insert: [{s:"CI", t:"臨床(例如NIHSS＞25)及∕或適當之影像術評估為嚴重之中風。"}, {s:"RC", t:"電腦斷層掃描顯示病人早期有重大梗塞的徴兆 [例如大量水腫、腫塊效應或中線偏移 (midline shift)]。"}], nhi: [{s:"CI", t:"臨床（例如NIHSS>25 分）及/或適當之影像術評估為嚴重之中風（電腦斷層大於1/3 中大腦動脈灌流區之低密度變化）。"}], guide: [{src:"TSS 2025", s:"CI", t:"腦部影像學評估為嚴重中風（電腦斷層>1/3 MCA灌流區之低密度變化）。"}, {src:"TSS 2025", s:"RC", t:"3-4.5小時內臨床嚴重中風，但非腦部影像學評估為嚴重之中風(如NIHSS＞25，但電腦斷層無顯示大片之低密度變化)。"}, {src:"TSS 2025", s:"Consider", t:"3小時內臨床嚴重中風，但非腦部影像學評估為嚴重之中風(如NIHSS＞25，但電腦斷層無顯示大片之低密度變化)。"}, {src:"AHA/ASA 2026", s:"CI", t:"CT with extensive hypodensity."}] },
    age: { name: "高齡 / 青少年 / mRS", insert: [{s:"CI", t:"兒童及未滿十八歲之青少年。"}, {s:"RC", t:"較年輕的病人、80歲以上之病人。", n:"相較於較年輕的病人,80歲以上之病人當血栓溶解時發生顱內出血的風險可能會升高,治療淨效益也可能較低。急性缺血性中風病人必須依據個別狀況評估其血栓溶解的效益風險。"}], nhi: [{s:"COND", t:"收案條件：年齡在 18 歲以上。"}], guide: [{src:"TSS 2025", s:"COND", t:"年齡在18歲以上。"}, {src:"TSS 2025", s:"RC", t:"過去功能狀態mRS ≧ 2分。"}, {src:"AHA/ASA 2026", s:"Consider", t:"Advanced Age (individualized assessment)."}, {src:"AHA/ASA 2026", s:"RC", t:"Pre-existing disability."}] },
    bp: { name: "血壓過高", insert: [{s:"CI", t:"嚴重且未被控制的動脈高血壓。"}, {s:"CI", t:"經處置後持續維持收縮壓> 185 mmHg 或舒張壓> 110 mmHg。"}], nhi: [{s:"CI", t:"嚴重且未被控制的動脈高血壓。"}, {s:"CI", t:"收縮壓>185mmHg 或舒張壓>110mmHg，或需要積極的治療（靜脈給藥）以降低血壓至前述界限以下。"}], guide: [{src:"TSS 2025", s:"CI", t:"衰竭或經矯正後血壓持續維持 > 185/110 mmHg。"}, {src:"AHA/ASA 2026", s: "CI", t: "Blood pressure > 185/110 mmHg and remains above limits after treatment."}] },
    glucose: { name: "血糖異常", insert: [{s:"CI", t:"經處置後持續維持血糖< 50 mg/dL 或血糖> 400 mg/dL。"}], nhi: [{s:"CI", t: "血糖<50mg/dL 或>400mg/Dl。"}], guide: [{src:"TSS 2025", s: "CI", t: "經矯正後血糖持續維持 < 50 mg/dL 或 > 400 mg/dL。"}, {src:"TSS 2025", s:"RC", t: "血糖異常（< 50 mg/dL或> 400 mg/dL）時，經臨床處理校正血糖後仍存在神經學缺損，高度懷疑為急性缺血性中風。"}] },
    platelets: { name: "血小板低下", insert: [{s:"CI", t: "血小板少於 100,000/mm3。"}], nhi: [{s:"CI", t: "血小板<100,000/mm3。"}], guide: [{src:"TSS 2025", s: "CI", t: "血小板數<100,000/mm3、INR＞1.7或aPTT > 40 sec。"}] },
    coag: { name: "凝血指標異常", insert: [{s:"CI", t: "INR>1.7或prothrombin time (PT)>15秒或aPTT過高。", n:"對最近未曾使用抗凝血劑或heparin治療的病人，可在未獲得凝血參數前先開始ACTILYSE的治療，然而如治療前之International Normalized Ratio (INR)>1.7或prothrombin time (PT)>15秒或aPTT過高，應立即停止ACTILYSE之輸注。"}], nhi: [{s:"CI", t: "中風發作前48 小時內使用heparin，目前病人活化部分凝血脢原時間(aPTT)之值過高。"}], guide: [{src:"TSS 2025", s: "CI", t: "服用Warfarin且INR＞1.7。"}, {src:"TSS 2025", s: "CI", t: "血小板數<100,000/mm3、INR＞1.7或aPTT > 40 sec。"}, {src:"AHA/ASA 2026", s: "CI", t: "Severe coagulopathy (INR > 1.7, PT > 15s)."}] },

        nhi: [

        ],

function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }

function updateView(id) {
    const s = scenarios[id];
    if (!s) return;
    const display = document.getElementById('mainDisplay');
    
    const generateRows = (items, type) => {
        if (!items || items.length === 0) return `<div class="desc-row"><div class="text-content">未具體列入此項規範。</div></div>`;
        return items.map(item => `
            <div class="desc-row">
                <div class="text-content">
                    ${item.src ? `<b>[${item.src}]</b> ` : ''}${item.t}
                    ${item.n ? `<span class="supplement-note">${item.n}</span>` : ''}
                </div>
                <span class="status-tag ${getTagClass(item.s, type)}">${getTagText(item.s, type)}</span>
            </div>
        `).join('');
    };

    let html = `
        <div class="scenario-header"><h1>${s.name.split(' <small>')[0]}</h1></div>
        <div class="category-container">
            <div class="cat-box">
                <div class="cat-header header-insert">
                    (1) 藥品仿單 (Actilyse 2025)
                    <a href="${DRIVE_LINKS.insert}" target="_blank" class="header-link">仿單🔗</a>
                </div>
                <div class="cat-body">${generateRows(s.insert, 'insert')}</div>
            </div>
            <div class="cat-box">
                <div class="cat-header header-nhi">
                    (2) 健保給付規定 (NHI 2023)
                    <a href="${DRIVE_LINKS.nhi}" target="_blank" class="header-link">給付規定🔗</a>
                </div>
                <div class="cat-body">${generateRows(s.nhi, 'nhi')}</div>
            </div>
            <div class="cat-box">
                <div class="cat-header header-guide">
                    (3) 醫療學術指引 (Guidelines)
                    <div class="header-links-row">
                        <a href="${DRIVE_LINKS.tw}" target="_blank" class="header-link">TSS🔗</a>
                        <a href="${DRIVE_LINKS.us}" target="_blank" class="header-link">AHA/ASA🔗</a>
                    </div>
                </div>
                <div class="cat-body">${generateRows(s.guide, 'guide')}</div>
            </div>
        </div>
    `;
    display.innerHTML = html;
    if (window.innerWidth < 768) toggleMenu();
    window.scrollTo(0, 0);
}

function filterScenarios() {
    const filter = document.getElementById('scenarioSearch').value.toUpperCase();
    const btns = document.querySelectorAll('.nav-btn');
    btns.forEach(btn => {
        const text = btn.innerText.toUpperCase();
        btn.classList.toggle('hidden', text.indexOf(filter) === -1);
    });
}

function getTagClass(s, type) { 
    if (s === 'COND') return 'tag-cond';
    if (s === 'CI' && type === 'nhi') return 'tag-nhi';
    return s === 'CI' ? 'tag-ci' : s === 'RC' ? 'tag-rc' : s === 'Consider' ? 'tag-consider' : 'tag-none'; 
}

function getTagText(s, type) { 
    if (s === 'COND') return '必備條件';
    if (s === 'CI') {
        if (type === 'insert') return '禁忌';
        if (type === 'nhi') return '排除條件';
        return '絕對禁忌';
    }
    return s === 'RC' ? '相對禁忌' : s === 'Consider' ? '建議考慮' : '未條列'; 
}
