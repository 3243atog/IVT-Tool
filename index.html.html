</head>

function updateView(id) {
    const s = scenarios[id];
    if (!s) return;

    const display = document.getElementById('mainDisplay');
    
    let html = `
        <div class="scenario-header">
            <h1>${s.name}</h1>
        </div>
        <div class="category-container">
            <!-- (1) 仿單 -->
            <div class="cat-box">
                <div class="cat-header header-insert">
                    (1) 藥品仿單 (Actilyse 2025)
                    <span class="status-tag ${getTagClass(s.insert.s)}">${getTagText(s.insert.s)}</span>
                </div>
                <div class="cat-body">
                    <div class="full-text">${s.insert.t}</div>
                    <br>
                    <a href="${s.insert.l}" target="_blank" class="text-link">PDF 連結 🔗</a>
                </div>
            </div>

            <!-- (2) 健保 -->
            <div class="cat-box">
                <div class="cat-header header-nhi">
                    (2) 健保給付規定 (NHI 2023)
                    <span class="status-tag ${getTagClass(s.nhi.s)}">${getTagText(s.nhi.s)}</span>
                </div>
                <div class="cat-body">
                    <div class="full-text">${s.nhi.t}</div>
                    <br>
                    <a href="${s.nhi.l}" target="_blank" class="text-link">PDF 連結 🔗</a>
                </div>
            </div>

            <!-- (3) 指引 -->
            <div class="cat-box">
                <div class="cat-header header-guide">
                    (3) 醫療學術指引 (Guidelines)
                </div>
                <div class="cat-body">
                    ${s.guide.map((g) => `
                        <div class="source-subitem">
                            <div class="source-label-row">
                                <span class="source-name">${g.src}</span>
                                <span class="status-tag ${getTagClass(g.s)}">${getTagText(g.s)}</span>
                            </div>
                            <div class="full-text">${g.t}</div>
                            <a href="${g.l}" target="_blank" class="text-link">PDF 連結 🔗</a>
                        </div>
                    `).join('')}
                </div>
            </div>
        </div>
    `;
    
    display.innerHTML = html;
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
    if(event && event.currentTarget && event.currentTarget.classList.contains('nav-btn')) event.currentTarget.classList.add('active');
}

function filterScenarios() {
    const input = document.getElementById('scenarioSearch');
    const filter = input.value.toUpperCase();
    const navButtons = document.querySelectorAll('.nav-btn');
    const navGroups = document.querySelectorAll('.nav-group');

    navButtons.forEach(btn => {
        const txtValue = btn.textContent || btn.innerText;
        if (txtValue.toUpperCase().indexOf(filter) > -1) {
            btn.classList.remove('hidden');
        } else {
            btn.classList.add('hidden');
        }
    });

    navGroups.forEach(group => {
        const visibleBtns = group.querySelectorAll('.nav-btn:not(.hidden)');
        if (visibleBtns.length === 0) {
            group.style.display = 'none';
        } else {
            group.style.display = 'block';
        }
    });
}

function getTagClass(status) {
    if (status === 'CI') return 'tag-ci';
    if (status === 'RC') return 'tag-rc';
    if (status === 'Consider') return 'tag-consider';
    return 'tag-none';
}

function getTagText(status) {
    if (status === 'CI') return '絕對禁忌';
    if (status === 'RC') return '相對禁忌';
    if (status === 'Consider') return '建議考慮';
    return '未條列';
}
